name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  offline-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.lock

      - name: Install locked dependencies
        run: python -m pip install -r requirements-dev.lock

      - name: Validate dependency graph
        run: python -m pip check

      - name: Compile
        run: python -m compileall -q claude_register tests scripts

      - name: Offline tests
        run: python -m unittest discover -s tests -v

      - name: Coverage
        run: |
          coverage run -m unittest discover -s tests
          coverage report --fail-under=82

      - name: Ruff
        run: ruff check claude_register tests scripts

      - name: Bandit medium and high severity gate
        run: bandit -q -ll -r claude_register scripts

      - name: Whitespace
        run: git diff --check
