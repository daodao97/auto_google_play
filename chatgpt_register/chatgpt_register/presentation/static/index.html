<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ChatGPT 注册机</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="shell">
    <header>
      <div>
        <p class="eyebrow">LOCAL REGISTRATION CONSOLE</p>
        <h1>ChatGPT 注册机</h1>
        <p class="lead">OTP 协议注册、阶段跟踪与敏感结果私有落盘。</p>
      </div>
      <span id="health" class="badge">检查服务…</span>
    </header>

    <section class="panel">
      <div class="section-title"><span>01</span><h2>账号与网络</h2></div>
      <label>邮箱账号 <small>每行：邮箱----邮箱密码</small></label>
      <textarea id="accounts" rows="6" spellcheck="false" placeholder="user@example.com----mail-password"></textarea>
      <div class="grid">
        <div>
          <label for="proxy">固定代理 <small>可留空</small></label>
          <input id="proxy" placeholder="http://user:pass@host:port">
        </div>
        <div>
          <label for="proxyTemplate">粘性代理模板 <small>{session}</small></label>
          <input id="proxyTemplate" placeholder="http://user-session-{session}:pass@host:port">
        </div>
      </div>
      <div class="grid compact">
        <div><label for="country">国家</label><input id="country" value="US" maxlength="2"></div>
        <div><label for="impersonate">浏览器指纹</label><input id="impersonate" value="chrome136"></div>
        <div><label for="concurrency">并发</label><input id="concurrency" type="number" value="1" min="1" max="3"></div>
        <div><label for="retry">重试</label><input id="retry" type="number" value="0" min="0" max="1"></div>
      </div>
      <div class="actions">
        <button id="start" class="primary">开始注册</button>
        <button id="stop" class="secondary" disabled>停止</button>
        <span id="notice"></span>
      </div>
    </section>

    <section class="panel">
      <div class="section-title"><span>02</span><h2>运行状态</h2></div>
      <div class="metrics">
        <article><strong id="success">0</strong><small>成功</small></article>
        <article><strong id="partial">0</strong><small>部分完成</small></article>
        <article><strong id="failed">0</strong><small>失败</small></article>
      </div>
      <div id="tasks" class="tasks"><p class="empty">尚未开始任务</p></div>
    </section>
  </main>
  <script src="/app.js" defer></script>
</body>
</html>
